<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script>
        (function() {
            "use strict";

            // ========== 可配置参数 ==========
            const TARGET_WEBSITES = [
                'https://qiniu.kfc.brmkweb.cn',
                'https://vercel.kfc.brmkweb.cn',
                'https://aliyun.kfc.brmkweb.cn',
				'https://netlify.kfc.brmkweb.cn',
                'https://digitalocean.kfc.brmkweb.cn',
                'https://render.kfc.brmkweb.cn'
            ];

            const METHOD_TIMEOUT_MS = 800;      // 单次探测超时时间
            const AUTO_REDIRECT = true;          // 是否自动跳转
            const FAST_THRESHOLD = 300;           // 满意阈值(ms)：低于此值立即跳转
            const FALLBACK_URL = 'https://order.kfc.com.cn/preorder-taro/home';
            // =================================

            class SpeedDetector {
                constructor(websites, timeout = 800) {
                    this.websites = websites;
                    this.timeout = timeout;
                    this.results = [];
                    this.isRedirected = false;    // 防止多次跳转
                }

                getBaseUrl(url) {
                    try {
                        const urlObj = new URL(url);
                        return `${urlObj.protocol}//${urlObj.host}`;
                    } catch {
                        return null;
                    }
                }

                testWithPrefetch(url) {
                    return new Promise((resolve, reject) => {
                        const baseUrl = this.getBaseUrl(url);
                        if (!baseUrl) {
                            reject(new Error('invalid_url'));
                            return;
                        }

                        const link = document.createElement('link');
                        const testUrl = `${baseUrl}/?_prefetch=${Date.now()}`;
                        link.rel = 'prefetch';
                        link.href = testUrl;
                        link.as = 'document';

                        let settled = false;
                        const startTime = Date.now();

                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                cleanup();
                                reject(new Error('timeout'));
                            }
                        }, this.timeout);

                        const cleanup = () => {
                            if (link.parentNode) link.parentNode.removeChild(link);
                        };

                        link.onload = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({
                                    success: true,
                                    time: Date.now() - startTime,
                                    method: 'prefetch'
                                });
                            }
                        };

                        link.onerror = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                reject(new Error('load_failed'));
                            }
                        };

                        document.head.appendChild(link);
                    });
                }

                testWithFetch(url) {
                    return new Promise((resolve, reject) => {
                        const baseUrl = this.getBaseUrl(url);
                        if (!baseUrl) {
                            reject(new Error('invalid_url'));
                            return;
                        }

                        const controller = new AbortController();
                        const signal = controller.signal;
                        let settled = false;
                        const startTime = Date.now();

                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                controller.abort();
                                reject(new Error('timeout'));
                            }
                        }, this.timeout);

                        const testUrl = `${baseUrl}/favicon.ico?_cb=${Date.now()}`;

                        fetch(testUrl, {
                            method: 'HEAD',
                            cache: 'no-store',
                            importance: 'high',
                            signal: signal
                        }).then(() => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                resolve({
                                    success: true,
                                    time: Date.now() - startTime,
                                    method: 'fetch'
                                });
                            }
                        }).catch(() => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                reject(new Error('cors_or_network_error'));
                            }
                        });
                    });
                }

                async probeSingleSite(url) {
                    const promises = [
                        this.testWithFetch(url).then(r => ({ ...r, method: 'fetch' })),
                        this.testWithPrefetch(url).then(r => ({ ...r, method: 'prefetch' }))
                    ];

                    try {
                        const result = await Promise.any(promises);
                        console.log(`✅ ${url} - ${Math.round(result.time)}ms [${result.method}]`);
                        return { success: true, url, time: result.time, method: result.method };
                    } catch (error) {
                        console.log(`❌ ${url} - 不可达`);
                        return { success: false, url };
                    }
                }

                async detectAll(fastThreshold = FAST_THRESHOLD) {
                    console.log(`🚀 开始探测 ${this.websites.length} 个站点，满意阈值: ${fastThreshold}ms`);
                    const startTime = Date.now();

                    // 创建探测任务
                    const probePromises = this.websites.map(url => this.probeSingleSite(url));

                    // 用于提前终止的 Promise
                    let resolveFast;
                    const fastPromise = new Promise(resolve => {
                        resolveFast = resolve;
                    });

                    // 监听每个探测结果，如果满足阈值则提前返回
                    const wrappedPromises = probePromises.map(async (probePromise) => {
                        const result = await probePromise;
                        if (result.success && result.time <= fastThreshold && !this.isRedirected) {
                            // 满足阈值，立即返回这个结果
                            resolveFast([result]);
                        }
                        return result;
                    });

                    let finalResults;
                    try {
                        // 竞速：要么等到满意的结果，要么等所有结果完成
                        finalResults = await Promise.race([
                            fastPromise,
                            Promise.all(wrappedPromises)
                        ]);
                    } catch (e) {
                        finalResults = null;
                    }

                    // 处理最终结果
                    if (finalResults && finalResults.length > 0) {
                        this.results = finalResults.sort((a, b) => a.time - b.time);
                    } else {
                        const allResults = await Promise.all(wrappedPromises);
                        this.results = allResults.filter(r => r.success).sort((a, b) => a.time - b.time);
                    }

                    const elapsed = Math.round(Date.now() - startTime);
                    console.log(`📊 探测完成，总耗时 ${elapsed}ms，可用 ${this.results.length}/${this.websites.length} 个`);

                    if (this.results.length > 0) {
                        console.log(`🏆 最快站点: ${this.results[0].url} (${Math.round(this.results[0].time)}ms)`);
                        this.results.forEach((r, i) => {
                            console.log(`   ${i + 1}. ${r.url} - ${Math.round(r.time)}ms [${r.method}]`);
                        });
                    } else {
                        console.log(`⚠️ 所有站点均不可达`);
                    }

                    return this.results;
                }

                getFastestUrl() {
                    return this.results.length > 0 ? this.results[0].url : null;
                }

                redirectToFastest() {
                    if (this.isRedirected) return false;
                    
                    const fastestUrl = this.getFastestUrl();
                    if (!fastestUrl) {
                        console.log(`⚠️ 无可用站点，跳转到备用地址: ${FALLBACK_URL}`);
                        this.isRedirected = true;
                        window.location.href = FALLBACK_URL;
                        return false;
                    }

                    const currentOrigin = window.location.origin;
                    const targetOrigin = fastestUrl.replace(/\/$/, '');

                    if (currentOrigin === targetOrigin) {
                        console.log('✅ 当前已是最快站点');
                        return false;
                    }

                    console.log(`🔀 跳转到最快站点: ${fastestUrl}`);
                    this.isRedirected = true;
                    window.location.href = fastestUrl;
                    return true;
                }
            }

            // 执行探测
            const detector = new SpeedDetector(TARGET_WEBSITES, METHOD_TIMEOUT_MS);
            
            if (AUTO_REDIRECT) {
                // 启用快速跳转：一旦有站点低于阈值就跳转，不等其他
                detector.detectAll(FAST_THRESHOLD).then(() => {
                    detector.redirectToFastest();
                });
            } else {
                // 手动模式：等待所有完成，输出完整报告
                detector.detectAll().then(() => {
                    const fastest = detector.getFastestUrl();
                    if (fastest) {
                        console.log(`💡 手动模式，最快站点: ${fastest}`);
                    } else {
                        console.log(`💡 手动模式，无可用站点，可访问: ${FALLBACK_URL}`);
                    }
                });
            }
        })();
    </script>
</body>
</html>
